<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','Noto Sans TC',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="#f8fafc"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Cornhsu.Labeling — EF Core 多型標籤系統</text>

  <!-- ── 你的應用程式 ── -->
  <rect x="24" y="70" width="272" height="430" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="160" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">你的應用程式</text>

  <rect x="44" y="116" width="232" height="58" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="160" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Note : ILabelable&lt;int&gt;</text>
  <text x="160" y="160" text-anchor="middle" font-size="11" fill="#64748b">既有的 int 流水號主鍵直接可用</text>

  <rect x="44" y="186" width="232" height="58" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="160" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Memo : ILabelable&lt;Guid&gt;</text>
  <text x="160" y="230" text-anchor="middle" font-size="11" fill="#64748b">同一個 App 可混用不同主鍵型別</text>

  <rect x="44" y="276" width="232" height="76" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="160" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">LabelRegistry</text>
  <text x="160" y="320" text-anchor="middle" font-size="11" fill="#475569">r.Labelable&lt;Note&gt;(n =&gt; n.Title)</text>
  <text x="160" y="338" text-anchor="middle" font-size="11" fill="#64748b">主鍵型別以反射自動推斷</text>

  <rect x="44" y="396" width="232" height="76" rx="8" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="160" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Roslyn Analyzer(內建)</text>
  <text x="160" y="440" text-anchor="middle" font-size="11" fill="#78350f">忘記註冊 → CHSU001 編譯期警告</text>
  <text x="160" y="458" text-anchor="middle" font-size="11" fill="#78350f">marker-only → CHSU002</text>

  <line x1="160" y1="174" x2="160" y2="186" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="244" x2="160" y2="276" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 76 352 Q 60 374 76 396" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowAccent)"/>

  <!-- ── 套件 ── -->
  <rect x="344" y="70" width="272" height="430" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Cornhsu.Labeling</text>

  <rect x="364" y="116" width="232" height="150" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="480" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">ILabelStore(統一入口)</text>
  <text x="480" y="164" text-anchor="middle" font-size="11" fill="#475569">標籤 CRUD・貼標 / 撕標(冪等)</text>
  <text x="480" y="182" text-anchor="middle" font-size="11" fill="#475569">跨型別查詢・強型別 IQueryable</text>
  <text x="480" y="200" text-anchor="middle" font-size="11" fill="#475569">批次讀寫(解 N+1)・AND / OR</text>
  <text x="480" y="218" text-anchor="middle" font-size="11" fill="#475569">階層(含子孫)・使用次數統計</text>
  <text x="480" y="240" text-anchor="middle" font-size="11" fill="#64748b">並發保護:ConcurrencyStamp</text>

  <rect x="364" y="290" width="232" height="88" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="480" y="314" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">ApplyLabelModel</text>
  <text x="480" y="334" text-anchor="middle" font-size="11" fill="#475569">封閉泛型 LabelLink&lt;TEntity,TKey&gt;</text>
  <text x="480" y="352" text-anchor="middle" font-size="11" fill="#475569">每個註冊型別自動生成一張</text>
  <text x="480" y="368" text-anchor="middle" font-size="11" fill="#475569">帶真外鍵的連結表</text>

  <rect x="364" y="402" width="232" height="70" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="480" y="426" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">兩種掛載方式</text>
  <text x="480" y="446" text-anchor="middle" font-size="11" fill="#475569">AddLabeling&lt;TContext&gt;(DI)</text>
  <text x="480" y="463" text-anchor="middle" font-size="11" fill="#475569">LabelStoreFactory(無 DI 的 WPF)</text>

  <!-- ── 資料庫 ── -->
  <rect x="664" y="70" width="272" height="430" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="800" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#7e22ce">資料庫</text>
  <text x="800" y="118" text-anchor="middle" font-size="11" fill="#64748b">SQLite・SQL Server・PostgreSQL</text>

  <rect x="684" y="136" width="232" height="88" rx="8" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="800" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Label</text>
  <text x="800" y="180" text-anchor="middle" font-size="11" fill="#475569">名稱全域唯一・父子階層</text>
  <text x="800" y="198" text-anchor="middle" font-size="11" fill="#475569">顏色 / 圖示・並發戳記</text>
  <text x="800" y="215" text-anchor="middle" font-size="11" fill="#64748b">業務欄位 → 消費端伴生表</text>

  <rect x="684" y="248" width="232" height="64" rx="8" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="800" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">LabelLink_Note</text>
  <text x="800" y="292" text-anchor="middle" font-size="11" fill="#475569">複合主鍵防重複・真外鍵 cascade</text>

  <rect x="684" y="328" width="232" height="64" rx="8" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="800" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">LabelLink_Memo</text>
  <text x="800" y="372" text-anchor="middle" font-size="11" fill="#475569">刪實體或刪標籤都不留孤兒資料</text>

  <text x="800" y="430" text-anchor="middle" font-size="12" fill="#64748b">…每個註冊型別一張,自動生成</text>
  <text x="800" y="462" text-anchor="middle" font-size="11" fill="#94a3b8">EF Migrations 相容</text>
  <text x="800" y="480" text-anchor="middle" font-size="11" fill="#94a3b8">(dotnet ef migrations add 直接可用)</text>

  <line x1="684" y1="280" x2="705" y2="222" stroke="#c084fc" stroke-width="1.2"/>
  <line x1="684" y1="360" x2="700" y2="224" stroke="#c084fc" stroke-width="1.2"/>

  <!-- ── 跨欄箭頭 ── -->
  <line x1="296" y1="146" x2="364" y2="180" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="296" y1="216" x2="364" y2="196" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="330" y="150" text-anchor="middle" font-size="11" fill="#475569">貼標 / 查詢</text>

  <line x1="276" y1="314" x2="364" y2="330" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="320" y="308" text-anchor="middle" font-size="11" fill="#475569">註冊</text>

  <line x1="596" y1="190" x2="684" y2="180" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="596" y1="334" x2="684" y2="280" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="596" y1="350" x2="684" y2="360" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="640" y="176" text-anchor="middle" font-size="11" fill="#475569">SQL</text>
  <text x="640" y="330" text-anchor="middle" font-size="11" fill="#475569">建表</text>

  <text x="480" y="534" text-anchor="middle" font-size="11" fill="#94a3b8">v1.0.0 · 78 tests · CI:3 資料庫 × EF Core 8/9/10 · MIT</text>
</svg>
